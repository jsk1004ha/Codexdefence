<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>오비탈 코어: 아이들 타워 디펜스</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1280" height="720"></canvas>

    <header id="topHud" class="glass">
      <div>
        <p class="eyebrow">ORBITAL CORE // COMMAND</p>
        <h1>오비탈 코어</h1>
      </div>
      <div id="hudStats"></div>
    </header>

    <nav id="navRail" class="glass">
      <button data-screen="main">전투</button>
      <button data-screen="upgradeCenter">업그레이드</button>
      <button data-screen="missions">미션</button>
      <button data-screen="coreSelect">코어</button>
      <button data-screen="mastery">마스터리</button>
      <button data-screen="research">연구소</button>
      <button data-screen="relics">유물</button>
      <button data-screen="challenge">도전</button>
      <button data-screen="prestige">프레스티지</button>
      <button data-screen="codex">도감</button>
      <button data-screen="hidden">히든</button>
      <button data-screen="planner">기획서</button>
      <button id="saveBtn">저장</button>
    </nav>

    <aside id="panelContainer"></aside>

    <div id="mobileControls" class="glass">
      <button id="mobileStart">시작</button>
      <button id="ultBtn">궁극기</button>
      <button id="mobileRetreat">귀환</button>
      <button id="mobileMenu">패널</button>
    </div>

    <div id="upgradeOverlay" class="hidden"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
